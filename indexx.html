<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application From</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="form-container">
        <h2>Job application Form</h2>
        <p class="form-subtitle">Please fill out the details below accurately.</p>

        <form id="applicationForm" novalidate>
            
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your full name">
                <span class="error-msg" id="nameError"></span>
            </div>

            <div class="form-group">
                <label for="userEmail">Email Address</label>
                <input type="email" id="userEmail" placeholder="name@example.com">
                <span class="error-msg" id="emailError"></span>
            </div>

            <div class="form-group">
                <label for="userPhone">Phone Number</label>
                <input type="tel" id="userPhone" placeholder="Enter numeric digits only">
                <span class="error-msg" id="phoneError"></span>
            </div>

            <div class="form-group">
                <label for="userMessage">Cover Message</label>
                <textarea id="userMessage" rows="4" placeholder="Type your structural message here..."></textarea>
                <span class="error-msg" id="messageError"></span>
            </div>

            <button type="submit" class="submit-btn">Submit Application</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
